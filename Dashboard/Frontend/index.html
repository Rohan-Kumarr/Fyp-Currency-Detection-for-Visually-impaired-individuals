<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Currency Detector - Accessible Currency Recognition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .option-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .option-btn {
            flex: 1;
            min-width: 200px;
            padding: 20px;
            border: 3px solid #667eea;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            font-weight: 600;
            color: #667eea;
        }

        .option-btn:hover, .option-btn.active {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .camera-section, .upload-section {
            display: none;
            margin-top: 30px;
        }

        .camera-section.active, .upload-section.active {
            display: block;
        }

        video {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .capture-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .capture-btn:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: #764ba2;
            background: #f0f2ff;
            transform: scale(1.02);
        }

        .drop-zone-text {
            font-size: 1.2rem;
            color: #667eea;
            font-weight: 600;
        }

        .file-input {
            display: none;
        }

        .result-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .prediction {
            font-size: 1.5rem;
            font-weight: 700;
            color: #28a745;
            margin-bottom: 10px;
        }

        .confidence {
            font-size: 1.1rem;
            color: #666;
        }

        .loading {
            display: none;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #dc3545;
            background: #f8d7da;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .option-buttons {
                flex-direction: column;
            }
            
            .option-btn {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 AI Currency Detector</h1>
        <p class="subtitle">Accessible currency recognition for everyone</p>
        
        <div class="option-buttons">
            <button class="option-btn" id="cameraBtn" onclick="selectOption('camera')">
                📷 Live Camera
            </button>
            <button class="option-btn" id="uploadBtn" onclick="selectOption('upload')">
                📁 Upload Image
            </button>
        </div>

        <div class="camera-section" id="cameraSection">
            <video id="video" autoplay playsinline></video>
            <br>
            <button class="capture-btn" onclick="captureImage()">Capture & Detect</button>
        </div>

        <div class="upload-section" id="uploadSection">
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="drop-zone-text">
                    📤 Click here or drag & drop an image
                </div>
            </div>
            <input type="file" id="fileInput" class="file-input" accept="image/*" onchange="handleFileSelect(event)">
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing currency...</p>
        </div>

        <div class="result-section" id="resultSection">
            <div class="prediction" id="prediction"></div>
            <div class="confidence" id="confidence"></div>
        </div>

        <div class="error" id="error"></div>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        let currentStream = null;
        let selectedOption = null;

        // Speech synthesis for accessibility
        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.8;
                utterance.volume = 1;
                speechSynthesis.speak(utterance);
            }
        }

        function selectOption(option) {
            selectedOption = option;
            
            // Update button states
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(option + 'Btn').classList.add('active');
            
            // Show/hide sections
            document.querySelectorAll('.camera-section, .upload-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(option + 'Section').classList.add('active');
            
            if (option === 'camera') {
                startCamera();
                speak('Camera mode selected. Position currency in front of camera and click capture.');
            } else {
                stopCamera();
                speak('Upload mode selected. Click or drag an image to detect currency.');
            }
            
            hideResults();
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                const video = document.getElementById('video');
                video.srcObject = stream;
                currentStream = stream;
            } catch (error) {
                showError('Camera access denied or not available');
                speak('Camera access denied or not available');
            }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }

        function captureImage() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            canvas.toBlob(blob => {
                if (blob) {
                    sendImageForPrediction(blob);
                    speak('Image captured. Analyzing currency...');
                }
            }, 'image/jpeg', 0.8);
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                sendImageForPrediction(file);
                speak('Image selected. Analyzing currency...');
            } else {
                showError('Please select a valid image file');
                speak('Please select a valid image file');
            }
        }

        // Drag and drop functionality
        const dropZone = document.getElementById('dropZone');
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                sendImageForPrediction(files[0]);
                speak('Image dropped. Analyzing currency...');
            } else {
                showError('Please drop a valid image file');
                speak('Please drop a valid image file');
            }
        });

        async function sendImageForPrediction(imageBlob) {
            showLoading();
            hideResults();
            hideError();
            
            const formData = new FormData();
            formData.append('file', imageBlob);
            
            try {
                // Update this URL to match your Flask backend
                const response = await fetch('http://localhost:5000/predict', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                
                const result = await response.json();
                displayResult(result);
                
            } catch (error) {
                console.error('Error:', error);
                showError('Failed to analyze image. Please check your connection and try again.');
                speak('Failed to analyze image. Please try again.');
            } finally {
                hideLoading();
            }
        }

        function displayResult(result) {
            const predictionEl = document.getElementById('prediction');
            const confidenceEl = document.getElementById('confidence');
            
            if (result.prediction) {
                predictionEl.textContent = `Currency: ${result.prediction}`;
                confidenceEl.textContent = result.confidence ? 
                    `Confidence: ${(result.confidence * 100).toFixed(1)}%` : '';
                
                // Speak the result
                const speechText = `Detected currency: ${result.prediction}`;
                speak(speechText);
                
                showResults();
            } else {
                showError('No currency detected in the image');
                speak('No currency detected in the image');
            }
        }

        function showLoading() {
            document.getElementById('loading').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        function showResults() {
            document.getElementById('resultSection').classList.add('show');
        }

        function hideResults() {
            document.getElementById('resultSection').classList.remove('show');
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        // Initialize with upload option
        window.addEventListener('load', () => {
            selectOption('upload');
            speak('Welcome to AI Currency Detector. Choose camera or upload option to detect currency.');
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            stopCamera();
        });
    </script>
</body>
</html>
